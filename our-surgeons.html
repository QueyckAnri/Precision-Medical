<!DOCTYPE html>
<html lang="en">
<head>

  <title>Our Surgeons — Precision Medical</title>
  <meta name="description" content="Meet the world-class multidisciplinary neurosurgical team at Precision Medical. Each surgeon brings international fellowship training and thousands of successful operations.">

            "on-primary": "#ffffff",

            "on-secondary-fixed": "#1e1b1b",

  <!-- JS page-transition detection -->
  <script>document.documentElement.classList.add('js-enabled');</script>
  <style>
    /* Prevent scrolling on this subpage — should fit viewport height exactly */
    html, body {
      overflow: hidden !important;
      height: 100vh !important;
    }
    /* On mobile, account for taller 2-row header (~110px) */
    @media (max-width: 768px) {
      main {
        height: calc(100dvh - 110px) !important;
      }
    }
    /* Ensure the surgeons-root fills available space */
    #surgeons-root {
      width: 100%;
    }
    /* Prevent FOUC before React hydrates */
    #surgeons-root:empty::before {
      content: '';
      display: block;
      height: 80px;
    }
    /* Enforce Tiposka for display headings only */
    h1, h2 {
      font-family: 'Tiposka', 'JetBrains Mono', 'IBM Plex Serif', monospace !important;
    }
    /* Material Symbols */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body>
  <div class="subpage-root">

    <!-- ── HEADER (shared pattern across all subpages) ───────────── -->
    <header class="header header-subpage">
      <div class="logo-container">
        <a href="index.html" class="logo-link">
          <img id="logo-img" src="/icons/logo.png" alt="Precision Medical Logo" class="logo-icon">
        </a>
      </div>
      <nav class="nav-menu">
        <a href="departments.html"    class="nav-link">Departments</a>
        <a href="about-us.html"       class="nav-link">About Us</a>
        <a href="our-surgeons.html"   class="nav-link active">Our Surgeons</a>
        <a href="second-opinion.html" class="nav-link">Second Opinion</a>
        <a href="contacts.html"       class="nav-link">Contacts</a>
      </nav>
    </header>

    <!-- ── MAIN: React mount point ──────────────────────────────── -->
    <main class="h-[calc(100vh-80px)] w-full overflow-hidden flex flex-col" style="height: calc(100dvh - 80px);">
      <div id="surgeons-root" class="w-full flex-1 min-h-0"></div>
    </main>

  </div>

  <!-- Shared page-transition JS -->
  <script type="module" src="/main.js"></script>
  <!-- React surgeons entry point -->
  <script type="module" src="/our-surgeons.jsx"></script>
</body>
</html>
